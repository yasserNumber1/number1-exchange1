<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Theme FOUC prevention: apply correct class before React loads ── -->
    <script>
      (function () {
        if (localStorage.getItem('theme') !== 'dark') {
          document.documentElement.classList.add('light');
        }
      })();
    </script>

    <!-- ── Primary SEO ── -->
    <title>Number1 Exchange | شراء وبيع USDT | تبادل العملات الرقمية</title>
    <meta name="description" content="اشتري وبيع USDT TRC20 بأفضل الأسعار في مصر. حول من فودافون كاش وإنستا باي واتصالات كاش إلى USDT وMoneyGo USD بسرعة وأمان على منصة Number1 Exchange." />
    <meta name="keywords" content="شراء USDT, بيع USDT, تبادل عملات رقمية, فودافون كاش USDT, انستا باي USDT, اتصالات كاش, Number1 Exchange, صرف USDT مصر" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://number1-exchange.vercel.app/" />

    <!-- ── Open Graph (Facebook / WhatsApp preview) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://number1-exchange.vercel.app/" />
    <meta property="og:title"       content="Number1 Exchange | شراء وبيع USDT بأفضل الأسعار" />
    <meta property="og:description" content="منصة Number1 لتبادل العملات الرقمية — أسرع تحويل USDT مع أفضل أسعار الصرف في مصر." />
    <meta property="og:image"       content="https://number1-exchange.vercel.app/images/N1.png" />
    <meta property="og:locale"      content="ar_EG" />
    <meta property="og:site_name"   content="Number1 Exchange" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Number1 Exchange | شراء وبيع USDT" />
    <meta name="twitter:description" content="أسرع منصة لتبادل USDT في مصر — فودافون كاش، إنستا باي، اتصالات كاش." />
    <meta name="twitter:image"       content="https://number1-exchange.vercel.app/images/N1.png" />
  </head>
